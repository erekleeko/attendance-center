<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>დირექტორის პანელი</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    h2, h3 { text-align: center; color: #2c3e50; }
    
    /* Login ეკრანი */
    #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    input[type="password"] { width: 80%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { background-color: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:hover { background-color: #2980b9; }
    #error-msg { color: #e74c3c; margin-top: 10px; display: none; }

    /* მთავარი პანელი */
    #dashboard-screen { display: none; max-width: 1200px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 40px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 220px; text-align: center; }
    .name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .status { font-size: 20px; font-weight: bold; margin: 15px 0; padding: 8px; border-radius: 8px; }
    .time { color: #7f8c8d; font-size: 13px; }
    
    .in { border-top: 5px solid #27ae60; }
    .in .status { background-color: #e8f8f5; color: #27ae60; }
    .out { border-top: 5px solid #e74c3c; }
    .out .status { background-color: #fdedec; color: #e74c3c; }

    /* ისტორიის ცხრილი */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background-color: #2c3e50; color: white; }
    .history-in { color: #27ae60; font-weight: bold; }
    .history-out { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>

  <!-- ავტორიზაციის ეკრანი -->
  <div id="login-screen">
    <h2>სისტემაში შესვლა</h2>
    <p>შეიყვანეთ დირექტორის პაროლი</p>
    <input type="password" id="pwd" placeholder="პაროლი...">
    <br>
    <button onclick="login()">შესვლა</button>
    <div id="error-msg">არასწორი პაროლი!</div>
  </div>

  <!-- დასწრების ლაივ პანელი და ისტორია -->
  <div id="dashboard-screen">
    <div class="top-bar">
      <h2>მიმდინარე დასწრება</h2>
      <button onclick="logout()" style="background-color: #e74c3c;">გასვლა</button>
    </div>
    
    <div class="grid" id="cards-container">
      <!-- ბარათები ჩაიტვირთება აქ -->
    </div>

    <h3>ბოლო მოქმედებების ისტორია</h3>
    <table>
      <thead>
        <tr>
          <th>დრო</th>
          <th>სახელი</th>
          <th>ქმედება</th>
        </tr>
      </thead>
      <tbody id="history-container">
        <!-- ისტორია ჩაიტვირთება აქ -->
      </tbody>
    </table>
  </div>

  <script>
    // ⚠️ აქ ჩასვი შენი GOOGLE APPS SCRIPT-ის ლინკი!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCFKTt6lC7wRKR41aNwPF6GgNRM36xc9I8Hnpmebs0MLUGqky-dV-19IP-z4P3JmnC/exec";
    
    let currentPassword = "";
    let autoRefreshInterval;

    function login() {
      currentPassword = document.getElementById("pwd").value;
      fetchData();
    }

    function logout() {
      currentPassword = "";
      document.getElementById("pwd").value = "";
      document.getElementById("dashboard-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "block";
      clearInterval(autoRefreshInterval);
    }

    function fetchData() {
      document.getElementById("error-msg").style.display = "none";
      
      const url = SCRIPT_URL + "?action=getDashboard&pwd=" + encodeURIComponent(currentPassword);
      
      fetch(url)
        .then(response => response.json())
        .then(data => {
          if(data.success) {
            // პაროლი სწორია, ვაჩვენებთ პანელს
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("dashboard-screen").style.display = "block";
            
            renderCards(data.live);
            renderHistory(data.history);
            
            // ავტომატური განახლება ყოველ 10 წამში (თუ უკვე არ არის ჩართული)
            if(!autoRefreshInterval) {
              autoRefreshInterval = setInterval(fetchData, 10000);
            }
          } else {
            // პაროლი არასწორია
            document.getElementById("error-msg").innerText = data.error;
            document.getElementById("error-msg").style.display = "block";
          }
        })
        .catch(error => console.error("Error:", error));
    }

    function renderCards(liveData) {
      const container = document.getElementById('cards-container');
      container.innerHTML = ''; 
      
      liveData.forEach(person => {
        const isPresent = (person.status === "მოვიდა");
        const card = document.createElement('div');
        card.className = "card " + (isPresent ? "in" : "out");
        
        card.innerHTML = `
          <div class="name">${person.name}</div>
          <div class="status">${isPresent ? "🟢 მოვიდა" : "🔴 წავიდა"}</div>
          <div class="time">დრო: ${person.time}</div>
        `;
        container.appendChild(card);
      });
    }

    function renderHistory(historyData) {
      const container = document.getElementById('history-container');
      container.innerHTML = '';
      
      historyData.forEach(row => {
        const tr = document.createElement('tr');
        const actionClass = (row.action === "მოვიდა") ? "history-in" : "history-out";
        
        tr.innerHTML = `
          <td>${row.time}</td>
          <td>${row.name}</td>
          <td class="${actionClass}">${row.action}</td>
        `;
        container.appendChild(tr);
      });
    }
  </script>
</body>
</html>
