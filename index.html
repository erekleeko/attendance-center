<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR დასწრების პანელი</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
    h2, h3 { text-align: center; color: #2c3e50; }
    
    #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; text-align: center; }
    input[type="password"] { width: 80%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; }
    button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #2980b9; }
    #error-msg { color: #e74c3c; margin-top: 10px; display: none; }

    #dashboard-screen { display: none; max-width: 1200px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 40px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 240px; text-align: center; position: relative;}
    .name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .status { font-size: 20px; font-weight: bold; margin: 10px 0; padding: 8px; border-radius: 8px; }
    .time { color: #7f8c8d; font-size: 13px; margin-bottom: 5px;}
    .note { font-size: 13px; font-weight: bold; margin-bottom: 15px; min-height: 18px; }
    
    /* ფერები სტატუსებისთვის */
    .in { border-top: 5px solid #27ae60; }
    .in .status { background-color: #e8f8f5; color: #27ae60; }
    .out { border-top: 5px solid #e74c3c; }
    .out .status { background-color: #fdedec; color: #e74c3c; }
    .vacation { border-top: 5px solid #f39c12; }
    .vacation .status { background-color: #fef5e7; color: #f39c12; }
    .absent { border-top: 5px solid #7f8c8d; }
    .absent .status { background-color: #f2f4f4; color: #7f8c8d; }

    /* მენიუ სტატუსის შესაცვლელად */
    .hr-controls { display: flex; gap: 5px; justify-content: center; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    .hr-controls select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 12px;}
    .hr-controls button { padding: 5px 10px; font-size: 12px; background-color: #2c3e50; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px;}
    th { background-color: #2c3e50; color: white; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>სისტემაში შესვლა</h2>
    <input type="password" id="pwd" placeholder="დირექტორის პაროლი...">
    <br><button onclick="login()">შესვლა</button>
    <div id="error-msg">არასწორი პაროლი!</div>
  </div>

  <div id="dashboard-screen">
    <div class="top-bar">
      <h2>მიმდინარე დასწრება და HR პანელი</h2>
      <button onclick="logout()" style="background-color: #e74c3c;">გასვლა</button>
    </div>
    
    <div class="grid" id="cards-container"></div>

    <h3>ბოლო მოქმედებების ისტორია</h3>
    <table>
      <thead><tr><th>დრო</th><th>სახელი</th><th>ქმედება</th><th>შენიშვნა</th></tr></thead>
      <tbody id="history-container"></tbody>
    </table>
  </div>

  <script>
    // ⚠️ აქ ჩასვი შენი APPS SCRIPT-ის ლინკი!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeL9pC6CS_cUUyGNTfKD7nR4_KAr5IjFSkoXlFVKzP7EnNWVcyW1qhtyIqApmtZz6O/exec";
    
    let currentPassword = "";
    let autoRefreshInterval;

    function login() {
      currentPassword = document.getElementById("pwd").value;
      fetchData();
    }

    function logout() {
      currentPassword = ""; document.getElementById("pwd").value = "";
      document.getElementById("dashboard-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "block";
      clearInterval(autoRefreshInterval);
    }

    function fetchData() {
      document.getElementById("error-msg").style.display = "none";
      const url = SCRIPT_URL + "?action=getDashboard&pwd=" + encodeURIComponent(currentPassword);
      
      fetch(url).then(r => r.json()).then(data => {
          if(data.success) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("dashboard-screen").style.display = "block";
            renderCards(data.live); renderHistory(data.history);
            if(!autoRefreshInterval) autoRefreshInterval = setInterval(fetchData, 10000);
          } else {
            document.getElementById("error-msg").innerText = data.error;
            document.getElementById("error-msg").style.display = "block";
          }
        }).catch(err => console.error(err));
    }

    // სტატუსის ხელით შეცვლის ფუნქცია
    function changeStatus(uid, name) {
      const select = document.getElementById('sel-' + uid);
      const newStatus = select.value;
      if(!newStatus) return;

      select.disabled = true;
      const url = SCRIPT_URL + "?action=setStatus&pwd=" + encodeURIComponent(currentPassword) + 
                  "&uid=" + uid + "&name=" + encodeURIComponent(name) + "&status=" + encodeURIComponent(newStatus);
      
      fetch(url).then(r => r.json()).then(data => {
        if(data.success) fetchData(); // ავტომატურად განაახლებს ეკრანს
        else alert("შეცდომა სტატუსის განახლებისას.");
      });
    }

    function renderCards(liveData) {
      const container = document.getElementById('cards-container');
      container.innerHTML = ''; 
      
      liveData.forEach(person => {
        let cardClass = "out", icon = "🔴", noteColor = "#7f8c8d";
        
        if (person.status === "მოვიდა") { cardClass = "in"; icon = "🟢"; }
        else if (person.status === "შვებულება") { cardClass = "vacation"; icon = "🏖️"; }
        else if (person.status === "გაცდენა") { cardClass = "absent"; icon = "🔘"; }

        // დაგვიანება ვაჩვენოთ წითლად, ნამუშევარი საათები ლურჯად
        if(person.note.includes("დააგვიანა")) noteColor = "#e74c3c";
        else if(person.note.includes("იმუშავა")) noteColor = "#2980b9";

        const card = document.createElement('div');
        card.className = "card " + cardClass;
        
        card.innerHTML = `
          <div class="name">${person.name}</div>
          <div class="status">${icon} ${person.status}</div>
          <div class="time">ბოლო დაფიქსირება: ${person.time}</div>
          <div class="note" style="color: ${noteColor}">${person.note}</div>
          
          <div class="hr-controls">
            <select id="sel-${person.uid}">
              <option value="">სტატუსის შეცვლა...</option>
              <option value="შვებულება">შვებულება</option>
              <option value="გაცდენა">გაცდენა</option>
              <option value="წავიდა">წავიდა (გაუქმება)</option>
            </select>
            <button onclick="changeStatus('${person.uid}', '${person.name}')">OK</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderHistory(historyData) {
      const container = document.getElementById('history-container');
      container.innerHTML = '';
      
      historyData.forEach(row => {
        const tr = document.createElement('tr');
        let actionColor = "#333";
        if(row.action === "მოვიდა") actionColor = "#27ae60";
        if(row.action === "წავიდა") actionColor = "#e74c3c";
        
        tr.innerHTML = `
          <td>${row.time}</td>
          <td>${row.name}</td>
          <td style="color: ${actionColor}; font-weight: bold;">${row.action}</td>
          <td>${row.note}</td>
        `;
        container.appendChild(tr);
      });
    }
  </script>
</body>
</html>
